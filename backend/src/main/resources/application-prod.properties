# GitHub Pages (browser Origin header is the host only, no path).
app.cors.allowed-origins=https://tissue45.github.io

# JWT secret MUST be provided in prod (e.g. env var APP_JWT_SECRET).
app.jwt.secret=${APP_JWT_SECRET:}

# Actuator in prod (keep minimal)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.ingest.async.enabled=${APP_INGEST_ASYNC_ENABLED:true}
app.ingest.sqs.queue-url=${APP_INGEST_SQS_QUEUE_URL:}
app.ingest.sqs.poll-delay-ms=${APP_INGEST_SQS_POLL_DELAY_MS:1500}
app.ingest.sqs.max-messages=${APP_INGEST_SQS_MAX_MESSAGES:5}
app.ingest.sqs.wait-seconds=${APP_INGEST_SQS_WAIT_SECONDS:10}

