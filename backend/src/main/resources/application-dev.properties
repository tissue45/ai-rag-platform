# Local dev convenience
app.cors.allowed-origins=http://localhost:5173,http://localhost:5188

# JWT (dev only). In prod, set via env/secret manager.
app.jwt.secret=dev-only-secret-change-me-dev-only-secret-change-me

# Actuator in dev
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

app.ingest.async.enabled=false

