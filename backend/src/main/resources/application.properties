spring.application.name=backend

# default profile (overridden by env SPRING_PROFILES_ACTIVE)
spring.profiles.active=dev

spring.datasource.url=jdbc:postgresql://localhost:5432/airag
spring.datasource.username=airag
spring.datasource.password=airag

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

# actuator defaults (overridable per profile)
management.endpoints.web.exposure.include=health,info

app.ingest.async.enabled=false
app.ingest.sqs.queue-url=
app.ingest.sqs.poll-delay-ms=1500
app.ingest.sqs.max-messages=5
app.ingest.sqs.wait-seconds=10
